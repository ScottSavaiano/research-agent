# Research Agent — Hermes profile distribution manifest
#
# Packages this profile as an installable Hermes agent. Anyone with access
# to the GitHub repo can install the whole agent — SOUL, config, skills,
# cron — with one command:
#
#     hermes profile install github.com/ScottSavaiano/research-agent --alias
#
# When the educator tags a new version, students run:
#
#     hermes profile update research-agent
#
# …and their installed research agent updates to the new SOUL and skills while
# their own conversation history, memories, and config tuning are preserved.

# -------------------------------------------------------------------
# Identity
# -------------------------------------------------------------------

name: research-agent

# Version follows semver. v0.x while the agent is still being built out;
# v1.0.0 is reserved for the first release that ships all Tier 2 skills.
version: 0.3.0
# Changelog:
#   0.3.0 (2026-07-08) — Execution-model rework + Analysis skill. The four execution/prep
#     skills (operationalize-construct, source-and-prepare-data, generate-synthetic-data,
#     and the NEW conduct-analysis) re-authored to the seven-step Plan→Teach→Review-plan→
#     Approve→Execute→Report→QC-audit model (two Review Agent checkpoints writing dated
#     files to a reviews/ folder; design/execution-plan-model-2026-07-07.md). SOUL: added
#     the rigor-only "Where I start with you" tenet and reworked the authorship line to the
#     precise STS boundary (agent executes/teaches/interprets/judges, disclosed+cited; only
#     the WRITING is the student's alone). redirect-off-topic: diagnostic-read apparatus
#     removed; off-topic parking reworded to the weekly-reflection list. "Review Agent"
#     capitalized as a role name throughout. Still v0.x — v1.0.0 reserved for the release
#     that adds the remaining Tier-2 per-shape analysis forms.
#   0.2.0 (2026-07-01) — Tier-2 FOUNDATIONAL SET landing: the full foundational skill
#     inventory below (operationalize-construct, the literature-review trio, both
#     execution data skills, redirect-off-topic, and the re-bundles) + SOUL voice-read
#     applied + config `background_review` aux pin (15th slot, v0.17.0). Still v0.x —
#     v1.0.0 is reserved for the release that adds the remaining Tier-2 analysis skills.
#   0.1.0 (2026-06-23) — first research-agent manifest.

description: |
  Research Agent — executes research methodology alongside the student
  within a cycle of the Hermes Research Curriculum at Bronx Science.
  Sources and prepares data, runs analysis (Python preferred, R
  acceptable), and supports the build-as-you-go working paper. One of
  three agents in the curriculum (with project-mentor and review-agent).
  Daily tier = Gemma 4 26B; careful tier = Kimi K2.6 via /model careful.

author: "Dr. Savaiano (Bronx High School of Science Social Science Research Program)"
license: "MIT"

# Minimum Hermes version. >=0.17.0 floor (matches the value below) — the curriculum
# relies on v0.16.0+ features (desktop app, session event hooks, bundled Google
# Workspace OAuth skill), the v0.15.x skill-protection guarantees, and the v0.17.0
# baseline the program standardized on (primer §9, floor raised 2026-06-24). Matches
# the floor applied to the project-mentor manifest. See hermes-platform-primer.md §9.
hermes_requires: ">=0.17.0"

# -------------------------------------------------------------------
# Environment variables required for install
# -------------------------------------------------------------------
# The installer checks these against the student's shell environment and
# the profile's existing .env, then generates a .env.EXAMPLE the student
# copies to .env and fills in. Each student receives a personalized
# OpenRouter sub-key from the teacher (same key used across all profiles).

env_requires:
  - name: OPENROUTER_API_KEY
    description: |
      Your assigned OpenRouter sub-key for the Hermes Research
      Curriculum. Issued by the research teacher during setup
      (Lesson 1) under the cohort's single organization account.
      Capped at the per-student semester budget. Do not share.
    required: true

# -------------------------------------------------------------------
# Distribution-owned paths (defaults are fine; left explicit for clarity)
# -------------------------------------------------------------------
# By default, `hermes profile update` REPLACES these paths from the new
# clone: SOUL.md, skills/, cron/, distribution.yaml. config.yaml
# is special-cased — it is PRESERVED on update unless --force-config is
# passed, so a student's machine-specific terminal.cwd survives updates.
#
# Excluded from the distribution entirely (Hermes hard-excludes these,
# no override possible): .env, auth.json, memories/, sessions/, state.db*,
# logs/, workspace/, plans/, home/, *_cache/, local/. The student's own
# work and credentials never travel into or out of the repo.

